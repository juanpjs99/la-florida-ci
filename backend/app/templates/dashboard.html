<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Iniciar Sesión</title>

</head>

<body>

    <h2>Panel Administrativo</h2>

    <form action="{{ url_for('auth.login') }}" method="POST">

        <div>

            <label>Correo electrónico</label>

            <input
                type="email"
                name="correo"
                required
            >

        </div>

        <br>

        <div>

            <label>Contraseña</label>

            <input
                type="password"
                name="password"
                required
            >

        </div>

        <br>

        <button type="submit">

            Iniciar sesión

        </button>

    </form>

</body>

</html>
