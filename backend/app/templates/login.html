<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión - Hogar Infantíl La Florida</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --color-primary: #492A93;
            --color-secondary: #DEE135;
            --color-light: #EFF2F5;
            --color-soft: #ABC0EC;
            --color-text: #2D2D2D;
            --color-text-light: #6C757D;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(73, 42, 147, 0.12);
            --shadow-hover: 0 12px 40px rgba(73, 42, 147, 0.18);
        }

        * {
            font-family: 'Nunito', sans-serif;
        }

        h1, h2, h3, h4, h5, h6, .btn, label {
            font-family: 'Comfortaa', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--color-secondary) 0%, #C9C82E 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
            transition: box-shadow 0.3s ease;
        }

        .login-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: var(--color-primary);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            font-family: 'Comfortaa', sans-serif;
            font-size: 2rem;
            color: white;
            font-weight: 700;
        }

        .brand h1 {
            color: var(--color-primary);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .brand p {
            color: var(--color-text-light);
            font-size: 0.95rem;
            margin: 0;
        }

        .form-label {
            color: var(--color-text);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border: 2px solid #E8ECF4;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            border-color: #E8ECF4;
        }

        .form-control:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(73, 42, 147, 0.1);
        }

        .form-control::placeholder {
            color: #B0B8C4;
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-light);
            z-index: 10;
            background: white;
            padding: 0 0.25rem;
        }

        .input-group .form-control {
            padding-left: 2.75rem;
        }

        .input-group .form-control:not(:first-child) {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .toggle-password {
            border: 2px solid #E8ECF4;
            border-left: none;
            border-radius: 0 12px 12px 0;
            background: white;
            color: var(--color-text-light);
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .toggle-password:hover {
            background: var(--color-light);
            color: var(--color-primary);
        }

        .toggle-password:focus {
            box-shadow: none;
            border-color: #E8ECF4;
        }

        .btn-primary {
            background: var(--color-primary);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #3A2178;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(73, 42, 147, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:focus {
            background: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(73, 42, 147, 0.2);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .form-check-label {
            color: var(--color-text-light);
            font-size: 0.9rem;
        }

        .form-switch .form-check-input {
            width: 2.5rem;
            height: 1.25rem;
            border-radius: 1rem;
            background-color: #E8ECF4;
            border: none;
        }

        .form-switch .form-check-input:checked {
            background-color: var(--color-primary);
        }

        .form-switch .form-check-input:focus {
            box-shadow: 0 0 0 4px rgba(73, 42, 147, 0.1);
        }

        .forgot-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .forgot-link:hover {
            color: #3A2178;
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--color-text-light);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #E8ECF4;
        }

        .divider span {
            padding: 0 1rem;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-text h2 {
            color: var(--color-primary);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .welcome-text p {
            color: var(--color-text-light);
            font-size: 0.95rem;
            margin: 0;
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .brand-logo {
                width: 70px;
                height: 70px;
                font-size: 1.75rem;
            }

            .brand h1 {
                font-size: 1.25rem;
            }

            .form-options {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <div class="brand">
                <div class="brand-logo">HIL</div>
                <h1>Hogar Infantil La Florida</h1>
                <p>Sistema de Gestión Escolar</p>
            </div>

            <div class="welcome-text">
                <h2>¡Bienvenidos!</h2>
                <p>Ingresa tus credenciales para acceder al panel administrativo</p>
            </div>

            <form action="{{ url_for('auth.login') }}" method="POST">

                <div class="mb-3">
                    <label for="correo" class="form-label">Correo electrónico</label>
                    <div class="input-group">
                        <input
                            type="email"
                            class="form-control"
                            id="correo"
                            name="correo"
                            placeholder="correo@ejemplo.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="btn btn-outline-secondary toggle-password" onclick="togglePassword()" aria-label="Ver contraseña">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" id="eye-icon">
                                <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                                <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <div class="form-check form-switch">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="recordarme"
                            name="recordarme"
                        >
                        <label class="form-check-label ms-2" for="recordarme">
                            Recordarme
                        </label>
                    </div>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary">
                    Iniciar Sesión
                </button>

            </form>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.77A9.045 9.045 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486l.708.709z"/><path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299l.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"/><path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.396-.098 2.046-.285l.709-.709z"/><path d="M4 8c0-1.02-.118-2.015-.338-2.945l.76.76a9.045 9.045 0 0 1 1.578-1.398c.502.744 1.24 1.398 2.117 1.878l.708.709a9.045 9.045 0 0 1-1.578 1.398A8.961 8.961 0 0 1 4 8z"/><path d="M8 16a6.965 6.965 0 0 1-3.722-1.155l-.91.91a8.066 8.066 0 0 1 3.723 1.155l.908-.908A7.939 7.939 0 0 1 8 16z"/>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>';
            }
        }
    </script>

</body>

</html>
