{% extends "dashboard/layout.html" %}

{% block title %}Nueva Galería{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm">

                <div class="card-header">
                    <h4 class="mb-0">Nueva Galería</h4>
                </div>

                <div class="card-body">

                    <form
                        action="{{ url_for('galeria.guardar') }}"
                        method="POST"
                        enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">
                                Título
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="titulo"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Descripción
                            </label>

                            <textarea
                                class="form-control"
                                name="descripcion"
                                rows="5"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Imagen de portada
                            </label>

                            <input
                                type="file"
                                class="form-control"
                                name="portada"
                                accept="image/*">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Estado
                            </label>

                            <select
                                class="form-select"
                                name="estado"
                                required>

                                <option value="ACTIVA" selected>
                                    Activa
                                </option>

                                <option value="OCULTA">
                                    Oculta
                                </option>

                            </select>

                        </div>

                        <div class="d-flex justify-content-end gap-2">

                            <a
                                href="{{ url_for('galeria.listar') }}"
                                class="btn btn-secondary">
                                Cancelar
                            </a>

                            <button
                                type="submit"
                                class="btn btn-primary">
                                Guardar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
