{% extends "dashboard/layout.html" %}

{% block title %}Nueva Galería{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/galerias.css') }}">

<a href="{{ url_for('galeria.listar') }}" class="galerias-back-link mb-3">
    <i class="bi bi-arrow-left"></i> Volver al listado
</a>

<div class="galerias-form-header mb-4">
    <h2 class="mb-1">
        <i class="bi bi-plus-circle me-2"></i>Nueva Galería
    </h2>
    <p class="subtitle mb-0">Completa los campos para crear una nueva galería de imágenes</p>
</div>

<div class="card galerias-form-card">
    <div class="card-body">

        <form action="{{ url_for('galeria.guardar') }}"
              method="POST"
              enctype="multipart/form-data">

            <div class="form-group-galeria">
                <label for="titulo">Título</label>
                <input type="text"
                       name="titulo"
                       id="titulo"
                       class="form-control-galeria"
                       placeholder="Ingresa el título de la galería"
                       required>
            </div>

            <div class="form-group-galeria">
                <label for="descripcion">Descripción</label>
                <textarea name="descripcion"
                          id="descripcion"
                          class="form-control-galeria"
                          rows="5"
                          placeholder="Describe brevemente el contenido de la galería"></textarea>
            </div>

            <div class="form-group-galeria">
                <label for="portada">Imagen de portada</label>
                <div class="form-file-galeria">
                    <input type="file"
                           name="portada"
                           id="portada"
                           accept="image/*">
                    <div class="file-label">
                        <i class="bi bi-image"></i>
                        <span>Seleccionar imagen de portada</span>
                    </div>
                </div>
            </div>

            <div class="form-group-galeria">
                <label for="estado">Estado</label>
                <select name="estado" id="estado" class="form-control-galeria" required>
                    <option value="ACTIVA" selected>Activa</option>
                    <option value="OCULTA">Oculta</option>
                </select>
            </div>

            <div class="form-actions-galeria">
                <a href="{{ url_for('galeria.listar') }}"
                   class="btn-cancelar">
                    <i class="bi bi-x-lg"></i> Cancelar
                </a>
                <button type="submit"
                        class="btn-submit-galeria"
                        style="width:auto;">
                    <i class="bi bi-check2-circle"></i> Guardar galería
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
